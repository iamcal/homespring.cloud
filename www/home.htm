<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>homespring.cloud</title>
<script src="homespring.js/lib/homespring.js"></script>
<style>

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
	--bg: #1e1e2e;
	--surface: #282840;
	--surface2: #313150;
	--border: #3e3e5e;
	--text: #cdd6f4;
	--text-dim: #7f849c;
	--accent: #89b4fa;
	--accent-hover: #74a8fc;
	--green: #a6e3a1;
	--red: #f38ba8;
	--yellow: #f9e2af;
	--peach: #fab387;
	--toolbar-h: 48px;
	--font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
	--font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

html, body {
	height: 100%;
	background: var(--bg);
	color: var(--text);
	font-family: var(--font-sans);
	overflow: hidden;
}

/* ---- Toolbar ---- */

#toolbar {
	height: var(--toolbar-h);
	background: var(--surface);
	border-bottom: 1px solid var(--border);
	display: flex;
	align-items: center;
	padding: 0 16px;
	gap: 8px;
}

#toolbar .brand {
	font-weight: 700;
	font-size: 15px;
	color: var(--accent);
	margin-right: 16px;
	user-select: none;
}

#toolbar button {
	background: var(--surface2);
	color: var(--text);
	border: 1px solid var(--border);
	border-radius: 6px;
	padding: 6px 14px;
	font-size: 13px;
	font-family: var(--font-sans);
	cursor: pointer;
	display: flex;
	align-items: center;
	gap: 5px;
	transition: background 0.15s, border-color 0.15s;
}

#toolbar button:hover {
	background: var(--border);
	border-color: var(--accent);
}

#toolbar button.active {
	background: var(--accent);
	color: var(--bg);
	border-color: var(--accent);
}

#toolbar .sep {
	width: 1px;
	height: 24px;
	background: var(--border);
	margin: 0 4px;
}

#toolbar .tick-counter {
	margin-left: auto;
	font-family: var(--font-mono);
	font-size: 13px;
	color: var(--text-dim);
}

/* ---- Layout ---- */

#main {
	display: flex;
	flex-direction: column;
	height: calc(100% - var(--toolbar-h));
}

#top-row {
	display: flex;
	flex: 0 0 40%;
	min-height: 200px;
	border-bottom: 2px solid var(--border);
}

#bottom-row {
	flex: 1 1 60%;
	min-height: 200px;
	position: relative;
}

/* ---- Pane chrome ---- */

.pane {
	display: flex;
	flex-direction: column;
	overflow: hidden;
}

.pane-header {
	height: 32px;
	min-height: 32px;
	background: var(--surface);
	border-bottom: 1px solid var(--border);
	display: flex;
	align-items: center;
	padding: 0 12px;
	font-size: 12px;
	font-weight: 600;
	text-transform: uppercase;
	letter-spacing: 0.5px;
	color: var(--text-dim);
	user-select: none;
}

.pane-body {
	flex: 1;
	overflow: auto;
	background: var(--bg);
}

/* ---- Source pane ---- */

#source-pane {
	flex: 0 0 50%;
	border-right: 2px solid var(--border);
}

#source-editor {
	width: 100%;
	height: 100%;
	background: var(--bg);
	color: var(--text);
	border: none;
	padding: 12px 16px;
	font-family: var(--font-mono);
	font-size: 14px;
	line-height: 1.6;
	resize: none;
	outline: none;
	tab-size: 4;
}

#source-editor::selection {
	background: rgba(137, 180, 250, 0.3);
}

/* ---- Right column ---- */

#right-col {
	flex: 1;
	display: flex;
	flex-direction: column;
}

#input-pane {
	flex: 0 0 50%;
	border-bottom: 1px solid var(--border);
}

#output-pane {
	flex: 1;
}

#input-area {
	width: 100%;
	height: 100%;
	background: var(--bg);
	color: var(--text);
	border: none;
	padding: 12px 16px;
	font-family: var(--font-mono);
	font-size: 14px;
	line-height: 1.6;
	resize: none;
	outline: none;
}

#output-log {
	padding: 12px 16px;
	font-family: var(--font-mono);
	font-size: 14px;
	line-height: 1.6;
	white-space: pre-wrap;
	color: var(--green);
}

/* ---- Tree pane ---- */

#tree-pane {
	width: 100%;
	height: 100%;
}

#tree-pane .pane-body {
	position: relative;
}

#tree-canvas {
	width: 100%;
	height: 100%;
	display: block;
}

/* ---- Tree node styles ---- */

.tree-node circle {
	stroke-width: 2px;
	cursor: pointer;
	transition: r 0.15s;
}

.tree-node:hover circle {
	r: 10;
}

.tree-node text {
	font-family: var(--font-mono);
	font-size: 11px;
	fill: var(--text);
	pointer-events: none;
}

.tree-link {
	fill: none;
	stroke: var(--border);
	stroke-width: 1.5px;
}

.salmon-node rect {
	rx: 3;
	ry: 3;
}

.salmon-node text {
	font-family: var(--font-mono);
	font-size: 10px;
	pointer-events: none;
}

</style>
</head>
<body>

<!-- Toolbar -->
<div id="toolbar">
	<span class="brand">homespring.cloud</span>
	<div class="sep"></div>
	<button id="btn-reset" title="Reset program">Reset</button>
	<button id="btn-step" title="Step one tick">Step</button>
	<button id="btn-play" title="Run program">Play</button>
	<button id="btn-stop" title="Stop execution" disabled>Stop</button>
	<div class="sep"></div>
	<span class="tick-counter">Tick: <span id="tick-num">0</span></span>
</div>

<!-- Main layout -->
<div id="main">

	<!-- Top row: source + input/output -->
	<div id="top-row">

		<div id="source-pane" class="pane">
			<div class="pane-header">Source</div>
			<div class="pane-body">
				<textarea id="source-editor" spellcheck="false">Universe bear hatchery Hello. World!.
 Powers   marshy marshy snowmelt</textarea>
			</div>
		</div>

		<div id="right-col">
			<div id="input-pane" class="pane">
				<div class="pane-header">Input</div>
				<div class="pane-body">
					<textarea id="input-area" spellcheck="false" placeholder="Program input..."></textarea>
				</div>
			</div>
			<div id="output-pane" class="pane">
				<div class="pane-header">Output</div>
				<div class="pane-body">
					<div id="output-log"></div>
				</div>
			</div>
		</div>

	</div>

	<!-- Bottom row: tree visualization -->
	<div id="bottom-row">
		<div id="tree-pane" class="pane" style="height:100%">
			<div class="pane-header">River System</div>
			<div class="pane-body">
				<svg id="tree-canvas"></svg>
			</div>
		</div>
	</div>

</div>

<script>

// ---- State ----

var program = null;
var running = false;
var runInterval = null;

// ---- DOM refs ----

var srcEditor = document.getElementById('source-editor');
var inputArea = document.getElementById('input-area');
var outputLog = document.getElementById('output-log');
var tickNum = document.getElementById('tick-num');
var btnReset = document.getElementById('btn-reset');
var btnStep = document.getElementById('btn-step');
var btnPlay = document.getElementById('btn-play');
var btnStop = document.getElementById('btn-stop');
var treeSvg = document.getElementById('tree-canvas');

// ---- Program management ----

function createProgram(){
	var src = srcEditor.value;
	outputLog.textContent = '';
	try {
		program = new HS.Program(src);
	} catch(e) {
		outputLog.textContent = 'Parse error: ' + e.message;
		program = null;
		renderTree();
		updateTick();
		return;
	}

	program.input = inputArea.value;

	program.onOutput = function(str){
		outputLog.textContent += str;
	};

	renderTree();
	updateTick();
}

function resetProgram(){
	stopRunning();
	createProgram();
}

function stepProgram(){
	if (!program || program.terminated) return;
	program.input = inputArea.value;
	program.tick();
	renderTree();
	updateTick();
}

function startRunning(){
	if (!program || program.terminated) return;
	running = true;
	btnPlay.classList.add('active');
	btnPlay.disabled = true;
	btnStop.disabled = false;
	btnStep.disabled = true;
	srcEditor.disabled = true;

	runInterval = setInterval(function(){
		if (!program || program.terminated){
			stopRunning();
			return;
		}
		program.input = inputArea.value;
		program.tick();
		renderTree();
		updateTick();
	}, 300);
}

function stopRunning(){
	running = false;
	if (runInterval){
		clearInterval(runInterval);
		runInterval = null;
	}
	btnPlay.classList.remove('active');
	btnPlay.disabled = false;
	btnStop.disabled = true;
	btnStep.disabled = false;
	srcEditor.disabled = false;
}

function updateTick(){
	tickNum.textContent = program ? program.tickNum : 0;
}

// ---- Toolbar events ----

btnReset.addEventListener('click', resetProgram);
btnStep.addEventListener('click', stepProgram);
btnPlay.addEventListener('click', startRunning);
btnStop.addEventListener('click', stopRunning);

// Reparse on source change (debounced)
var parseTimer = null;
srcEditor.addEventListener('input', function(){
	stopRunning();
	clearTimeout(parseTimer);
	parseTimer = setTimeout(function(){
		createProgram();
	}, 400);
});

// ---- SVG Tree Rendering ----

var SVG_NS = 'http://www.w3.org/2000/svg';

function svgEl(tag, attrs){
	var el = document.createElementNS(SVG_NS, tag);
	if (attrs){
		for (var k in attrs){
			el.setAttribute(k, attrs[k]);
		}
	}
	return el;
}

function renderTree(){
	// clear
	while (treeSvg.firstChild) treeSvg.removeChild(treeSvg.firstChild);

	if (!program || !program.root) return;

	var container = treeSvg.parentNode;
	var W = container.clientWidth || 800;
	var H = container.clientHeight || 400;
	treeSvg.setAttribute('width', W);
	treeSvg.setAttribute('height', H);
	treeSvg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);

	// compute layout: assign depth and sibling index
	var depthCounts = {};
	var nodeList = [];

	function layoutNode(node, depth){
		if (!depthCounts[depth]) depthCounts[depth] = 0;
		var idx = depthCounts[depth]++;
		var info = { node: node, depth: depth, idx: idx, children: [] };
		nodeList.push(info);
		for (var i = 0; i < node.kids.length; i++){
			info.children.push(layoutNode(node.kids[i], depth + 1));
		}
		return info;
	}

	var tree = layoutNode(program.root, 0);

	// find max depth and max count at any depth
	var maxDepth = 0;
	var maxCount = 0;
	for (var d in depthCounts){
		var di = parseInt(d);
		if (di > maxDepth) maxDepth = di;
		if (depthCounts[d] > maxCount) maxCount = depthCounts[d];
	}

	var padX = 80;
	var padY = 50;
	var usableW = W - padX * 2;
	var usableH = H - padY * 2;

	// position nodes: depth goes left to right, siblings top to bottom
	for (var i = 0; i < nodeList.length; i++){
		var n = nodeList[i];
		var cols = maxDepth + 1;
		var rows = depthCounts[n.depth];
		n.x = padX + (cols > 1 ? (n.depth / maxDepth) * usableW : usableW / 2);
		n.y = padY + (rows > 1 ? (n.idx / (rows - 1)) * usableH : usableH / 2);
	}

	// build a map from node uid to layout info
	var nodeMap = {};
	for (var i = 0; i < nodeList.length; i++){
		nodeMap[nodeList[i].node.uid] = nodeList[i];
	}

	// draw links first
	var linkGroup = svgEl('g');
	treeSvg.appendChild(linkGroup);

	for (var i = 0; i < nodeList.length; i++){
		var n = nodeList[i];
		if (n.node.parent){
			var pInfo = nodeMap[n.node.parent.uid];
			if (pInfo){
				var path = svgEl('path', {
					'd': 'M' + pInfo.x + ',' + pInfo.y +
					     ' C' + ((pInfo.x + n.x) / 2) + ',' + pInfo.y +
					     ' ' + ((pInfo.x + n.x) / 2) + ',' + n.y +
					     ' ' + n.x + ',' + n.y,
					'class': 'tree-link'
				});
				linkGroup.appendChild(path);
			}
		}
	}

	// draw nodes
	var nodeGroup = svgEl('g');
	treeSvg.appendChild(nodeGroup);

	// color scheme for node types
	function nodeColor(node){
		if (node.is_destroyed) return '#585b70';  // muted
		if (node.generates_power) return '#f9e2af'; // yellow - powered
		if (node.is_watered) return '#89b4fa';      // blue - watered
		if (node.is_snowy) return '#cdd6f4';        // white - snowy
		return '#a6e3a1';                           // green - default
	}

	function nodeStroke(node){
		if (node.is_destroyed) return '#45475a';
		return '#313150';
	}

	for (var i = 0; i < nodeList.length; i++){
		var n = nodeList[i];
		var g = svgEl('g', { 'class': 'tree-node', 'transform': 'translate(' + n.x + ',' + n.y + ')' });

		var circle = svgEl('circle', {
			'r': 7,
			'cx': 0,
			'cy': 0,
			'fill': nodeColor(n.node),
			'stroke': nodeStroke(n.node)
		});
		g.appendChild(circle);

		var label = svgEl('text', {
			'x': 0,
			'y': -14,
			'text-anchor': 'middle',
			'fill': n.node.is_destroyed ? '#585b70' : '#cdd6f4'
		});
		label.textContent = n.node.name || '(unnamed)';
		g.appendChild(label);

		// show state flags below node
		var flags = [];
		if (n.node.is_destroyed) flags.push('destroyed');
		if (n.node.generates_power) flags.push('power');
		if (n.node.is_watered) flags.push('water');
		if (n.node.is_snowy) flags.push('snow');
		if (flags.length){
			var stateLabel = svgEl('text', {
				'x': 0,
				'y': 20,
				'text-anchor': 'middle',
				'font-size': '9px',
				'fill': '#7f849c'
			});
			stateLabel.textContent = flags.join(' ');
			g.appendChild(stateLabel);
		}

		// tooltip for river node
		var tipLines = ['Node: ' + (n.node.name || '(unnamed)')];
		tipLines.push('Type: ' + (n.node.lname || n.node.name || 'unknown'));
		if (n.node.is_destroyed) tipLines.push('State: Destroyed');
		if (n.node.generates_power) tipLines.push('Power: Generating');
		if (n.node.is_watered) tipLines.push('Watered: Yes');
		if (n.node.is_snowy) tipLines.push('Snowy: Yes');
		tipLines.push('Children: ' + n.node.kids.length);
		if (n.node.salmon && n.node.salmon.length) tipLines.push('Salmon here: ' + n.node.salmon.length);
		var tip = svgEl('title');
		tip.textContent = tipLines.join('\n');
		g.appendChild(tip);

		nodeGroup.appendChild(g);

		// draw salmon at this node
		if (n.node.salmon && n.node.salmon.length){
			for (var s = 0; s < n.node.salmon.length; s++){
				var sal = n.node.salmon[s];
				var sx = n.x + 20;
				var sy = n.y + 6 + (s * 18);

				var isUpstream = sal.direction === HS.const.UPSTREAM;
				var isYoung = sal.age === HS.const.YOUNG;
				var salColor = isUpstream ? '#fab387' : '#89b4fa';
				var dirArrow = isUpstream ? '\u2190' : '\u2192';

				var sg = svgEl('g', { 'class': 'salmon-node', 'transform': 'translate(' + sx + ',' + sy + ')' });

				var rect = svgEl('rect', {
					'x': 0,
					'y': -8,
					'height': 16,
					'fill': salColor,
					'opacity': '0.25',
					'rx': 3,
					'ry': 3
				});
				sg.appendChild(rect);

				var sLabel = svgEl('text', {
					'x': 4,
					'y': 4,
					'fill': salColor,
					'font-weight': isYoung ? 'normal' : 'bold'
				});
				sLabel.textContent = dirArrow + ' ' + sal.name;
				sg.appendChild(sLabel);

				// size the background rect to fit the text
				nodeGroup.appendChild(sg);
				var bbox = sLabel.getBBox();
				rect.setAttribute('width', bbox.width + 8);
				nodeGroup.removeChild(sg);

				// tooltip for salmon
				var salTip = svgEl('title');
				salTip.textContent = [
					'Name: ' + sal.name,
					'Age: ' + (isYoung ? 'Young' : 'Mature'),
					'Direction: ' + (isUpstream ? 'Upstream' : 'Downstream'),
					'At node: ' + (n.node.name || '(unnamed)')
				].join('\n');
				sg.appendChild(salTip);

				nodeGroup.appendChild(sg);
			}
		}
	}
}

// ---- Resize handling ----

var resizeTimer = null;
window.addEventListener('resize', function(){
	clearTimeout(resizeTimer);
	resizeTimer = setTimeout(function(){
		renderTree();
	}, 100);
});

// ---- Init ----

createProgram();

</script>
</body>
</html>
