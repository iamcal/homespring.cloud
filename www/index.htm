function draw_d3(treeData){

var margin = {top: 20, right: 120, bottom: 20, left: 120},
 width = 960 - margin.right - margin.left,
 height = 500 - margin.top - margin.bottom;
 
var i = 0;

var tree = d3.layout.tree()
 .size([height, width]);

var diagonal = d3.svg.diagonal()
 .projection(function(d) { return [d.y, d.x]; });

var svg = d3.select("body").append("svg")
 .attr("width", width + margin.right + margin.left)
 .attr("height", height + margin.top + margin.bottom)
  .append("g")
 .attr("transform", "translate(" + margin.left + "," + margin.top + ")");

root = treeData[0];
  
update(root);

function update(source) {

  // Compute the new tree layout.
  var nodes = tree.nodes(root).reverse(),
   links = tree.links(nodes);

  // Normalize for fixed-depth.
  nodes.forEach(function(d) { d.y = d.depth * 180; });

  // Declare the nodesâ€¦
  var node = svg.selectAll("g.node")
   .data(nodes, function(d) { return d.id || (d.id = ++i); });

  // Enter the nodes.
  var nodeEnter = node.enter().append("g")
   .attr("class", "node")
   .attr("transform", function(d) { 
    return "translate(" + d.y + "," + d.x + ")"; });

  nodeEnter.append("circle")
   .attr("r", 10)
   .style("fill", "#fff");

  nodeEnter.append("text")
   .attr("x", function(d) { 
    return d.children || d._children ? -13 : 13; })
   .attr("dy", ".35em")
   .attr("text-anchor", function(d) { 
    return d.children || d._children ? "end" : "start"; })
   .text(function(d) { return d.name; })
   .style("fill-opacity", 1);

  // Declare the linksâ€¦
  var link = svg.selectAll("path.link")
   .data(links, function(d) { return d.target.id; });

  // Enter the links.
  link.enter().insert("path", "g")
   .attr("class", "link")
   .attr("d", diagonal);

}


}

function tree_to_d3(tree){

	var data = [];
	for (var i=0; i<tree.nodes.length; i++){
		data.push({
			'uid'		: tree.nodes[i].uid,
			'name'		: tree.nodes[i].name,
			'parent'	: tree.nodes[i].parent ? tree.nodes[i].parent.uid : null
		});
	}

	var dataMap = data.reduce(function(map, node){
		map[node.uid] = node;
		return map;
	}, {});

	var treeData = [];
	data.forEach(function(node){
		 // add to parent
		 var parent = dataMap[node.parent];
		 if (parent){
			// create child array if it doesn't exist
			(parent.children || (parent.children = []))
			// add node to child array
			.push(node);
		}else{
			// parent is null or missing
			treeData.push(node);
		}
	});

	return treeData;
}

function hs_tree(tokens){
	if (!tokens.length) return null;

	var c = 1;

	var root = new hs_node(c++, tokens[0]);
	var current = root;
	var nodes = [root];

	for (var i=1; i<tokens.length; i++){
		if (tokens[i] == ''){
			current = current.parent;
			if (!current){
				console.log('invalid program - traversed beyond start');
				return null;
			}
		}else{
			var n = new hs_node(c++, tokens[i], current);
			nodes.push(n);
			current = n;
		}
	}

	return {
		'root'	: root,
		'nodes'	: nodes
	};
}

function hs_node(uid, name, parent){
	var self = this;
	self.uid = uid;
	self.name = name;
	self.parent = parent;
	self.kids = [];
	if (parent) parent.kids.push(self);
	return self;
}

function hs_tokenize(str){
	// illegal stuff
	if (str.indexOf('\t') >= 0){ console.log('illegal program - contains tabs'); return []; }
	//if (str.indexOf(' . ') >= 0){ console.log('illegal program - contains space-dot-space'); return []; }
	//if (str.indexOf('. .') >= 0){ console.log('illegal program - contains dot-space-dot'); return []; }

	// tokenizing is super annoying to do via regexp or splits,
	// so we'll just go linearly through the string producing tokens.

	var tokens = [];

	var chars = str.split('');
	var next = '';
	var len = chars.length;

	for (var i=0; i<len; i++){
		if (chars[i] == ' '){
			// " ." is a literal period, else this terminates the token
			if (chars[i+1] == '.'){
				next += '.';
				i++;
			}else{
				tokens.push(next);
				next = '';
			}
		}else if (chars[i] == '\n'){
			// \n counts as whitespace, unless it's preceeded by a period
			// which is handled below
			tokens.push(next);
			next = '';
		}else if (chars[i] == '.'){
			if (chars[i+1] == ' '){
				next += ' ';
				i++;
			}else if (chars[i+1] == '\n'){
				next += '\n';
				tokens.push(next);
				next = '';
				i++;
			}else{
				console.log('parser error - unexpected period followewd by ' + chars[i+1]);
				return [];
			}
		}else{
			next += chars[i];
		}
	}
	if (next.length) tokens.push(next);

	return tokens;
}
