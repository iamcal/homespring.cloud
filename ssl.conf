<VirtualHost *:443>
	ServerName homespring.cloud
	ServerAlias www.homespring.cloud
	DocumentRoot /var/www/html/homespring.cloud/www

	RewriteEngine On
	RewriteCond %{http_host} ^www\.homespring\.cloud$ [NC]
	RewriteRule ^/?(.*)$ https://homespring.cloud/$1 [R=301,NC]

	SSLEngine on
	SSLCertificateFile /etc/letsencrypt/live/homespring.cloud/cert.pem
	SSLCertificateChainFile /etc/letsencrypt/live/homespring.cloud/chain.pem
	SSLCertificateKeyFile /etc/letsencrypt/live/homespring.cloud/privkey.pem

	Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
