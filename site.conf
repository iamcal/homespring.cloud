<VirtualHost *:80>
        ServerName homespring.cloud
        ServerAlias www.homespring.cloud

        DocumentRoot /var/www/html/homespring.cloud/www

        <Directory /var/www/html/homespring.cloud/www>
                php_admin_flag engine on
                php_admin_flag safe_mode off
                Options -Includes -ExecCGI
		AllowOverride all

		DirectoryIndex index.htm
        </Directory>

	RewriteEngine On
	RewriteCond %{http_host} !^homespring.cloud [NC]
	RewriteRule ^(.*)$ http://homespring.cloud$1 [R=301,NC] 
</VirtualHost>
